<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Dashboard - Team Task Manager</title>
</head>
<body class="dashboard-body">
    <nav>
        <h1>Team Dashboard</h1>
        <div class="nav-right">
            <button id="admin-create-btn" class="nav-control-btn" style="display:none;" onclick="showSection('admin-section')">➕ Create Task</button>
            <button id="view-task-btn" class="nav-control-btn" onclick="showSection('task-list-card')">📋 View Tasks</button>
            <span id="user-info" style="margin-left: 15px; font-weight: bold;"></span>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="dashboard-container">
        <div id="admin-section" class="card modal-section" style="display:none;">
            <div class="modal-header">
                <h3>🚀 Create New Task</h3>
                <button class="close-btn" onclick="closeSection('admin-section')">&times;</button>
            </div>
            <form id="taskForm">
                <div class="input-group">
                    <label for="taskTitle">Task Title</label>
                    <input type="text" id="taskTitle" placeholder="Enter task title" required>
                </div>
                <div class="input-group">
                    <label for="taskDesc">Description</label>
                    <input type="text" id="taskDesc" placeholder="Enter task description">
                </div>
                <div class="input-group">
                    <label for="dueDate">Due Date</label>
                    <input type="date" id="dueDate" required>
                </div>
                <div class="input-group">
                    <label for="projectSelect">Assign Project</label>
                    <select id="projectSelect">
                        <option value="Main Project">Main Project</option>
                        <option value="Development">Development</option>
                        <option value="Marketing">Marketing</option>
                    </select>
                </div>
                <button type="submit" class="btn">Add & Assign Task</button>
            </form>
        </div>

        <div id="task-list-card" class="card task-list-card modal-section" style="display:none;">
            <div class="task-header">
                <h3>Your Assigned Tasks</h3>
                <div>
                    <button class="refresh-btn" onclick="loadTasks()">🔄 Refresh</button>
                    <button class="close-btn" onclick="closeSection('task-list-card')" style="margin-left:10px;">&times;</button>
                </div>
            </div>
            <ul id="tasks">
            </ul>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const role = localStorage.getItem('role');
            
            if(role) {
                document.getElementById('user-info').innerText = `Role: ${role}`;
                
                if (role === 'Admin') {
                    // Admin ke liye create task button aur section default dikhega
                    document.getElementById('admin-create-btn').style.display = 'block';
                    showSection('admin-section');
                } else if (role === 'Member') {
                    // Member ke liye sirf View Task default dikhega
                    document.getElementById('admin-create-btn').style.display = 'none';
                    showSection('task-list-card');
                }
            }
        });

        // Section toggle karne ke liye
        function showSection(id) {
            // Dono sections ko hide karke by-default clear karte hain
            document.getElementById('admin-section').style.display = 'none';
            document.getElementById('task-list-card').style.display = 'none';
            
            // Sirf click kiya hua section show hoga
            document.getElementById(id).style.display = 'block';
        }

        function closeSection(id) {
            document.getElementById(id).style.display = 'none';
        }
    </script>
</body>
</html>
