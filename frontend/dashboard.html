<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Dashboard - Team Task Manager</title>
</head>
<body>
    <nav>
        <h1>Team Dashboard</h1>
        <div class="nav-right">
            <span id="user-info" style="margin-right: 15px; font-weight: bold;"></span>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="dashboard-container">
        <div id="admin-section" class="card" style="display:none;">
            <h3>🚀 Create New Task</h3>
            <form id="taskForm">
                <div class="input-group">
                    <label for="taskTitle">Task Title</label>
                    <input type="text" id="taskTitle" placeholder="Enter task title" required>
                </div>
                <div class="input-group">
                    <label for="taskDesc">Description</label>
                    <input type="text" id="taskDesc" placeholder="Enter task description">
                </div>
                <div class="input-group">
                    <label for="dueDate">Due Date</label>
                    <input type="date" id="dueDate" required>
                </div>
                <div class="input-group">
                    <label for="projectSelect">Assign Project</label>
                    <select id="projectSelect">
                        <option value="Main Project">Main Project</option>
                        <option value="Development">Development</option>
                        <option value="Marketing">Marketing</option>
                    </select>
                </div>
                <button type="submit" class="btn">Add & Assign Task</button>
            </form>
        </div>

        <div class="card task-list-card">
            <div class="task-header">
                <h3>Your Assigned Tasks</h3>
                <button class="refresh-btn" onclick="loadTasks()">🔄 Refresh</button>
            </div>
            <ul id="tasks">
                </ul>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        const role = localStorage.getItem('role');
        if(role) {
            document.getElementById('user-info').innerText = `Role: ${role}`;
        }
    </script>
</body>
</html>
